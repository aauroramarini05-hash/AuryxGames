<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>La Grande Ruota delle Parole</title>
  <style>
    :root{
      --bg:#050913;--bg2:#0e1a3a;--panel:#121c3f;--panel2:#1f2f64;--text:#f5f7ff;--muted:#9fb0ea;
      --primary:#2fa8ff;--secondary:#7b5cff;--ok:#1ed38a;--danger:#ff5a7c;--gold:#ffd45f;
      --radius:16px;--shadow:0 10px 30px rgba(0,0,0,.35)
    }
    *{box-sizing:border-box} body{margin:0;color:var(--text);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:radial-gradient(circle at 15% 10%,#1b2f74,var(--bg) 50%), radial-gradient(circle at 90% 80%,#1b2b56,transparent 30%);
      min-height:100vh}
    .screen{display:none;max-width:1250px;margin:auto;padding:16px}.screen.active{display:block}
    .card{background:linear-gradient(165deg,var(--panel),var(--panel2));border:1px solid rgba(255,255,255,.1);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
    h1,h2,h3{margin:.3rem 0 .8rem;text-align:center}
    .grid{display:grid;gap:12px}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}
    .layout{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    label{font-size:.9rem;color:var(--muted)} input,select{width:100%;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,.15);background:#0e1635;color:#fff}
    .btn{border:0;padding:10px 14px;border-radius:12px;font-weight:700;color:#fff;cursor:pointer;background:linear-gradient(90deg,var(--primary),#27d1ff)}
    .btn.alt{background:linear-gradient(90deg,#3d4f92,#5d73be)} .btn.warn{background:linear-gradient(90deg,#b63f57,var(--danger))}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .row{display:flex;flex-wrap:wrap;gap:8px}.row .btn{flex:1}
    .wheelWrap{position:relative;display:flex;align-items:center;justify-content:center}
    #wheel{width:min(88vw,460px);height:min(88vw,460px)}
    .pointer{position:absolute;top:5px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-top:28px solid var(--gold);filter:drop-shadow(0 2px 4px black)}
    .category{text-align:center;font-weight:700;color:var(--gold)}
    .board{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;min-height:130px;background:#0c1433;border-radius:12px;padding:10px}
    .tile{width:34px;height:44px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:#203271;border:1px solid rgba(255,255,255,.15);font-weight:800;font-size:1.1rem}
    .tile.space,.tile.punct{background:transparent;border-color:transparent;color:#90a1da}
    .tile.reveal{animation:reveal .3s ease}@keyframes reveal{from{transform:scale(.6)}to{transform:scale(1)}}
    .players{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px}.player{background:#0c1433;border:1px solid rgba(255,255,255,.15);padding:10px;border-radius:10px}.player.active{outline:2px solid #45d8ff}
    .kbd{display:grid;grid-template-columns:repeat(9,1fr);gap:6px}.key{padding:8px;border-radius:8px;background:#1f2f67;border:1px solid rgba(255,255,255,.12);color:#fff;cursor:pointer}.key:disabled{opacity:.35}
    .msg{min-height:42px;padding:10px;border-radius:10px;background:#0a1330;border-left:4px solid #35d0ff;margin:8px 0}
    .top{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
    .pill{padding:6px 10px;background:#0a1330;border-radius:999px;border:1px solid rgba(255,255,255,.12)}
    .solveBox{display:none;gap:8px;margin-top:8px}.solveBox.active{display:flex}
    @media (max-width:920px){.layout{grid-template-columns:1fr}.kbd{grid-template-columns:repeat(7,1fr)}}
  </style>
</head>
<body>
<main>
  <section id="start" class="screen active">
    <div class="card">
      <h1>🎡 La Grande Ruota delle Parole</h1>
      <p style="text-align:center;color:var(--muted)">Un quiz show italiano originale, completo e senza asset protetti.</p>
      <div class="grid g3">
        <div><label>Giocatori umani</label><select id="humanCount"><option value="1">1</option><option value="2" selected>2</option><option value="3">3</option></select></div>
        <div><label>Difficoltà CPU</label><select id="difficulty"><option value="facile">Facile</option><option value="media" selected>Media</option><option value="difficile">Difficile</option></select></div>
        <div><label>Audio</label><select id="audio"><option value="on">Attivo</option><option value="off">Silenzioso</option></select></div>
      </div>
      <div id="nameGrid" class="grid g3" style="margin-top:12px"></div>
      <div class="row" style="margin-top:12px"><button id="startBtn" class="btn">Nuova partita</button><button id="resetStorage" class="btn warn">Reset salvataggi</button></div>
    </div>
  </section>

  <section id="game" class="screen">
    <div class="top"><h2 id="roundLabel">Round 1/3</h2><div class="pill">Miglior punteggio: <strong id="bestScore">0</strong></div></div>
    <div class="layout">
      <div class="card wheelWrap"><div class="pointer"></div><canvas id="wheel" width="500" height="500"></canvas></div>
      <div class="card">
        <div class="category" id="category">Categoria</div>
        <div id="board" class="board"></div>
        <div id="message" class="msg">Premi "Gira la ruota" per iniziare.</div>
        <div id="spinResult" class="pill" style="text-align:center;margin-bottom:8px">Risultato ruota: -</div>
        <div class="row"><button id="spinBtn" class="btn">Gira la ruota</button><button id="buyBtn" class="btn alt">Compra vocale (-250)</button><button id="solveBtn" class="btn alt">Risolvi</button></div>
        <div id="solveBox" class="solveBox"><input id="solveInput" placeholder="Inserisci frase completa" /><button id="confirmSolve" class="btn">Conferma</button></div>
        <div class="row" style="margin-top:8px"><button id="nextRoundBtn" class="btn alt">Nuovo round</button><button id="newGameBtn" class="btn warn">Nuova partita</button></div>
      </div>
    </div>
    <div class="card" style="margin-top:12px"><h3>Giocatori</h3><div id="players" class="players"></div></div>
    <div class="card" style="margin-top:12px"><h3>Tastiera</h3><div id="keyboard" class="kbd"></div></div>
  </section>

  <section id="end" class="screen">
    <div class="card"><h2>🏆 Fine partita</h2><p id="winner"></p><ol id="ranking"></ol><button id="againBtn" class="btn">Rigioca</button></div>
  </section>
</main>
<script>
(() => {
  const PHRASES = [
    ['Proverbi','Chi dorme non piglia pesci'],['Proverbi','Tra il dire e il fare c e di mezzo il mare'],['Proverbi','Ride bene chi ride ultimo'],['Proverbi','Meglio tardi che mai'],['Proverbi','L abito non fa il monaco'],['Proverbi','Rosso di sera bel tempo si spera'],
    ['Cinema','La dolce vita'],['Cinema','Nuovo cinema paradiso'],['Cinema','Il postino'],['Cinema','La grande bellezza'],['Cinema','Perfetti sconosciuti'],['Cinema','Mediterraneo'],
    ['Musica','Nel blu dipinto di blu'],['Musica','Azzurro'],['Musica','L italiano vero'],['Musica','Con te partiro'],['Musica','Viva la vita'],
    ['Geografia','Roma caput mundi'],['Geografia','Il giro d italia'],['Geografia','La laguna di venezia'],['Geografia','Il vesuvio domina il golfo'],['Geografia','Le cinque terre'],
    ['Cucina italiana','Spaghetti alla carbonara'],['Cucina italiana','Risotto alla milanese'],['Cucina italiana','Pizza margherita'],['Cucina italiana','Tiramisu fatto in casa'],['Cucina italiana','Pesto genovese'],
    ['Sport','Calcio di rigore'],['Sport','Campionato di serie a'],['Sport','Vittoria al fotofinish'],['Sport','Maratona cittadina'],['Sport','Coppa italia'],
    ['Cultura generale','La penna e piu forte della spada'],['Cultura generale','Il sapere non pesa'],['Cultura generale','Biblioteca nazionale'],['Cultura generale','Scienza e coscienza'],
    ['Modi di dire','In bocca al lupo'],['Modi di dire','Acqua in bocca'],['Modi di dire','Avere le mani in pasta'],['Modi di dire','Essere al settimo cielo'],['Modi di dire','Prendere due piccioni con una fava'],['Modi di dire','Andare d accordo']
  ];
  const WHEEL = [100,200,300,400,500,750,1000,'Bancarotta','Perdi turno','Jolly','Bonus'];
  const VOWELS = 'AEIOU';
  const LETTERS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
  const ROUND_COUNT = 3;
  let state = null;

  const $ = s => document.querySelector(s), $$ = s => [...document.querySelectorAll(s)];
  const normalize = s => (s||'').toUpperCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^A-Z]/g,'');

  const audio = {ctx:null,enabled:true,ensure(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();},tone(f=440,d=0.08,t='sine',v=.03){if(!this.enabled)return;this.ensure();const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=t;o.frequency.value=f;g.gain.value=v;o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+d);},click(){this.tone(620,.03,'square',.02)},ok(){this.tone(740,.09,'triangle',.03)},err(){this.tone(170,.12,'sawtooth',.03)},win(){this.tone(520,.08);setTimeout(()=>this.tone(700,.1),90);setTimeout(()=>this.tone(900,.15),200)},bankrupt(){this.tone(120,.28,'square',.04)}};

  function saveLocal(){localStorage.setItem('grandeRuotaSave',JSON.stringify({audio:audio.enabled?'on':'off',best:state?.best||0,names:state?.players?.map(p=>p.name)||[]}));}
  function loadLocal(){try{return JSON.parse(localStorage.getItem('grandeRuotaSave')||'{}')}catch{return {}}}
  function showScreen(id){$$('.screen').forEach(x=>x.classList.remove('active'));$('#'+id).classList.add('active');}

  function buildNameInputs(){const n=+$('#humanCount').value;const box=$('#nameGrid');box.innerHTML='';for(let i=0;i<n;i++){box.insertAdjacentHTML('beforeend',`<div><label>Nome giocatore ${i+1}</label><input id="name${i}" value="Giocatore ${i+1}" /></div>`);} }

  function initGame(){
    const humans=+$('#humanCount').value, diff=$('#difficulty').value;
    audio.enabled=$('#audio').value==='on';
    state={
      round:1,turn:0,angle:0,animating:false,spinValue:null,spun:false,bonus:false,best:loadLocal().best||0,
      difficulty:diff,players:[],used:new Set(),phrase:'',category:'',revealed:[]
    };
    for(let i=0;i<humans;i++) state.players.push({name:($('#name'+i).value||`Giocatore ${i+1}`).trim(),cpu:false,round:0,total:0,jolly:false});
    if(humans===1){state.players.push({name:'CPU Alfa',cpu:true,round:0,total:0,jolly:false},{name:'CPU Beta',cpu:true,round:0,total:0,jolly:false});}
    startRound(true);showScreen('game');updateUI();maybeCpuTurn();
  }

  function startRound(first=false){
    state.players.forEach(p=>p.round=0);state.used.clear();state.spinValue=null;state.spun=false;state.bonus=false;
    const [cat,ph]=PHRASES[Math.floor(Math.random()*PHRASES.length)]; state.category=cat; state.phrase=ph.toUpperCase();
    state.revealed=[...state.phrase].map(ch=>!/[A-Z]/.test(ch));
    message(first?'Inizia la partita!':'Nuovo round iniziato!'); $('#spinResult').textContent='Risultato ruota: -';
    updateUI();
  }

  function message(t){$('#message').textContent=t;}
  function current(){return state.players[state.turn];}
  function nextTurn(){state.turn=(state.turn+1)%state.players.length;state.spun=false;state.spinValue=null;state.bonus=false;message(`Turno di ${current().name}`);updatePlayers();maybeCpuTurn();}

  function drawWheel(){
    const c=$('#wheel'),x=c.getContext('2d'),cx=250,cy=250,R=220,seg=WHEEL.length,step=(Math.PI*2)/seg;
    x.clearRect(0,0,c.width,c.height);x.save();x.translate(cx,cy);x.rotate(state.angle);
    for(let i=0;i<seg;i++){x.beginPath();x.moveTo(0,0);x.arc(0,0,R,i*step,(i+1)*step);x.closePath();x.fillStyle=`hsl(${(i*360)/seg} 85% 56%)`;x.fill();x.strokeStyle='rgba(0,0,0,.25)';x.stroke();x.save();x.rotate(i*step+step/2);x.fillStyle='#fff';x.font='bold 18px sans-serif';x.textAlign='right';x.fillText(String(WHEEL[i]),R-12,6);x.restore();}
    x.beginPath();x.arc(0,0,34,0,Math.PI*2);x.fillStyle='#09102a';x.fill();x.restore();
  }

  function spin(){
    if(state.animating) return;
    state.animating=true;audio.click();
    const startAngle=state.angle,target=startAngle+(Math.random()*7+7)*Math.PI,duration=2600,start=performance.now();
    const ticker=setInterval(()=>audio.tone(250+Math.random()*180,.02,'square',.01),105);
    const frame=(now)=>{
      const t=Math.min((now-start)/duration,1),ease=1-Math.pow(1-t,3);
      state.angle=startAngle+(target-startAngle)*ease;drawWheel();
      if(t<1) requestAnimationFrame(frame);
      else{
        clearInterval(ticker);state.animating=false;
        const seg=WHEEL.length,step=(Math.PI*2)/seg;
        const corrected=(Math.PI*1.5 - (state.angle%(Math.PI*2)) + Math.PI*2)%(Math.PI*2);
        const idx=Math.floor(corrected/step)%seg; const result=WHEEL[idx];
        $('#spinResult').textContent='Risultato ruota: '+result;
        applyWheelResult(result);updateUI();maybeCpuTurn();
      }
    };
    requestAnimationFrame(frame);
  }

  function applyWheelResult(r){
    const p=current();
    if(r==='Bancarotta'){
      if(p.jolly){p.jolly=false;message(`${p.name} usa il Jolly e salva il punteggio!`);}
      else {p.round=0;audio.bankrupt();message('Bancarotta! Punteggio round azzerato.');nextTurn();}
      return;
    }
    if(r==='Perdi turno'){
      if(p.jolly){p.jolly=false;message(`${p.name} usa il Jolly e non perde il turno.`);state.spun=false;}
      else {audio.err();message('Perdi turno!');nextTurn();}
      return;
    }
    if(r==='Jolly'){p.jolly=true;audio.ok();message(`${p.name} ottiene un Jolly.`);state.spun=false;return;}
    if(r==='Bonus'){state.spinValue=500;state.spun=true;state.bonus=true;message('Bonus: prossima consonante vale doppio!');return;}
    state.spinValue=r;state.spun=true;message(`${p.name} può giocare una consonante da ${r} punti.`);
  }

  function renderBoard(){const b=$('#board');b.innerHTML='';[...state.phrase].forEach((ch,i)=>{const d=document.createElement('div');if(!/[A-Z]/.test(ch))d.className='tile '+(ch===' ' ? 'space':'punct');else d.className='tile';d.textContent=state.revealed[i]?ch:'■';b.appendChild(d);});}
  function updatePlayers(){$('#players').innerHTML=state.players.map((p,i)=>`<div class="player ${i===state.turn?'active':''}"><strong>${p.name}${p.cpu?' 🤖':''}</strong><br>Round: ${p.round} pt<br>Totale: ${p.total} pt<br>Jolly: ${p.jolly?'Sì':'No'}</div>`).join('');}
  function renderKeyboard(){const k=$('#keyboard');k.innerHTML='';for(const l of LETTERS){const b=document.createElement('button');b.className='key';b.textContent=l;b.dataset.letter=l;if(state.used.has(l))b.disabled=true;k.appendChild(b);} }
  function updateUI(){ $('#roundLabel').textContent=`Round ${state.round}/${ROUND_COUNT}`;$('#category').textContent='Categoria: '+state.category;$('#bestScore').textContent=state.best;renderBoard();updatePlayers();renderKeyboard();saveLocal(); }

  function revealLetter(letter){let hits=0;[...state.phrase].forEach((ch,i)=>{if(ch===letter&&!state.revealed[i]){state.revealed[i]=true;hits++;}});return hits;}
  function solved(){return state.revealed.every(Boolean);}

  function tryLetter(letter){
    if(!letter||!LETTERS.includes(letter)||state.used.has(letter)||state.animating) return;
    const p=current(),isVowel=VOWELS.includes(letter);
    if(isVowel){if(p.round<250){message('Punti insufficienti per comprare una vocale.');audio.err();return;}p.round-=250;}
    else if(!state.spun){message('Prima devi girare la ruota.');audio.err();return;}

    state.used.add(letter);
    const hits=revealLetter(letter);
    if(hits>0){
      audio.ok();
      if(isVowel) message(`Vocale ${letter} trovata ${hits} volta/e.`);
      else {
        const gain=state.spinValue*(state.bonus?2:1)*hits;p.round+=gain;
        message(`Consonante ${letter} trovata ${hits} volta/e. +${gain} punti.`);
      }
      state.spun=false;state.bonus=false;
      updateUI();
      if(solved()) return finalizeRound(p.name);
      maybeCpuTurn();
    } else {
      audio.err();message(`La lettera ${letter} non è presente.`);updateUI();nextTurn();
    }
  }

  function finalizeRound(winnerName){
    const p=current();p.total+=p.round;state.best=Math.max(state.best,...state.players.map(x=>x.total));audio.win();
    message(`${winnerName} vince il round!`);
    if(state.round>=ROUND_COUNT){setTimeout(endGame,900);return;}
    setTimeout(()=>{state.round++;startRound();},1000);
  }

  function solvePhrase(answer){
    if(normalize(answer)===normalize(state.phrase)){finalizeRound(current().name);} else {audio.err();message('Soluzione errata, turno perso.');nextTurn();}
  }

  function endGame(){
    showScreen('end');
    const rank=[...state.players].sort((a,b)=>b.total-a.total);
    $('#winner').textContent=`Vincitore: ${rank[0].name} con ${rank[0].total} punti.`;
    $('#ranking').innerHTML=rank.map(p=>`<li>${p.name}: ${p.total} pt</li>`).join('');
  }

  function cpuPickConsonant(){
    const available=LETTERS.filter(l=>!state.used.has(l)&&!VOWELS.includes(l));
    if(state.difficulty==='facile') return available[Math.floor(Math.random()*available.length)];
    const freq=['R','S','T','N','L','C','D','M','P','G','B','F','V','Q','Z','H'];
    if(state.difficulty==='media') return freq.find(x=>available.includes(x)) || available[0];
    const inPhrase=[...new Set([...state.phrase].filter(ch=>/[A-Z]/.test(ch)&&!state.used.has(ch)&&!VOWELS.includes(ch)))];
    if(inPhrase.length&&Math.random()<.82) return inPhrase[Math.floor(Math.random()*inPhrase.length)];
    return freq.find(x=>available.includes(x)) || available[0];
  }
  function cpuPickVowel(){
    const available=LETTERS.filter(l=>!state.used.has(l)&&VOWELS.includes(l));
    if(!available.length) return null;
    if(state.difficulty==='facile') return available[Math.floor(Math.random()*available.length)];
    if(state.difficulty==='media') return ['A','E','I','O','U'].find(x=>available.includes(x));
    const inPhrase=[...new Set([...state.phrase].filter(ch=>VOWELS.includes(ch)&&!state.used.has(ch)))];
    return (inPhrase[0]||available[0]);
  }
  function maybeCpuTurn(){
    if(state.animating||!current().cpu) return;
    setTimeout(()=>{
      if(!current().cpu||state.animating) return;
      const revealedRatio=state.revealed.filter(Boolean).length/state.revealed.length;
      const solveChance=state.difficulty==='difficile'?revealedRatio*.75:state.difficulty==='media'?revealedRatio*.45:revealedRatio*.2;
      if(revealedRatio>.5 && Math.random()<solveChance){solvePhrase(state.phrase);return;}
      if(current().round>=250 && Math.random()<(state.difficulty==='difficile'?0.45:0.28)){
        const v=cpuPickVowel(); if(v) {tryLetter(v);return;}
      }
      if(!state.spun) spin(); else tryLetter(cpuPickConsonant());
    },700);
  }

  // Eventi UI
  $('#humanCount').addEventListener('change',buildNameInputs);
  $('#startBtn').addEventListener('click',initGame);
  $('#spinBtn').addEventListener('click',()=>{if(!current().cpu)spin();});
  $('#buyBtn').addEventListener('click',()=>{if(current().cpu)return;const letter=prompt('Scegli una vocale (A, E, I, O, U):','A'); if(letter) tryLetter(letter.trim().toUpperCase().slice(0,1));});
  $('#solveBtn').addEventListener('click',()=>$('#solveBox').classList.toggle('active'));
  $('#confirmSolve').addEventListener('click',()=>{if(current().cpu)return;solvePhrase($('#solveInput').value);$('#solveInput').value='';$('#solveBox').classList.remove('active');});
  $('#nextRoundBtn').addEventListener('click',()=>{if(state.round<ROUND_COUNT){state.round++;startRound();} else endGame();});
  $('#newGameBtn').addEventListener('click',()=>showScreen('start'));
  $('#againBtn').addEventListener('click',()=>showScreen('start'));
  $('#resetStorage').addEventListener('click',()=>{localStorage.removeItem('grandeRuotaSave');alert('Salvataggi cancellati.');});
  $('#keyboard').addEventListener('click',(e)=>{const l=e.target?.dataset?.letter;if(!l||current().cpu)return;tryLetter(l);});

  const saved=loadLocal(); if(saved.audio) $('#audio').value=saved.audio;
  buildNameInputs(); drawWheel();
})();
</script>
</body>
</html>
